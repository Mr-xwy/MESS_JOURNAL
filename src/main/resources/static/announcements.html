<body class="newspaper-page">
    <div class="sidebar-hover-zone" id="sidebar-trigger"></div>
    <button class="hamburger" id="hamburger" title="召唤导航栏" aria-label="召唤导航栏" aria-expanded="false" aria-controls="sidebar"><svg class="icon"><use href="#icon-menu"/></svg></button>

        </div>

            <a href="index.html" id="nav-home"><svg class="icon"><use href="#icon-home"/></svg> 首页</a>
            <a href="articles.html" id="nav-articles"><svg class="icon"><use href="#icon-doc"/></svg> 文章</a>
            <a href="my.html" id="nav-mine"><svg class="icon"><use href="#icon-folder"/></svg> 我的</a>

        </nav>
        <div class="header-right"><div id="user-area"></div></div>
    </header>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="top-brand">M·E·S·S Journal · 杂研期刊</div>
            <div class="top-right">管理后台 · 公告</div>
        </div>
        <header class="newspaper-masthead masthead--ink reveal">
            <div class="masthead-overline">Admin Console</div>
            <h1 class="masthead-title">公告管理</h1>
            <div class="masthead-tagline">Announcement · 发布 / 置顶 / 已读跟踪</div>
        </header>

        <section class="reveal">
            <div class="section-heading">
                <h2>全部公告</h2>
                <div class="sub">ANNOUNCEMENTS</div>
            </div>
            <div class="mgmt-toolbar">
                <button class="btn" id="btn-new">＋ 发布公告</button>
            </div>
            <div class="mgmt-table-wrap">
                <table class="mgmt-table" id="tbl">
                    <thead><tr><th>ID</th><th>标题</th><th>置顶</th><th>已读</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody id="rows"></tbody>
                </table>
            </div>
        </section>

        <footer class="footer footer--ink reveal">M·E·S·S Journal — 杂研期刊 · Mr.Vale</footer>
    </div>

    <div class="modal-mask" id="form-mask" style="display:none">
        <div class="modal" role="dialog" aria-modal="true">
            <h3 id="form-title">发布公告</h3>
            <form id="form">
                <input type="hidden" id="f-id">
                <label class="field"><span>标题</span><input id="f-title" required></label>
                <label class="field"><span>内容</span><textarea id="f-content" rows="5" required></textarea></label>
                <label class="field"><span><input type="checkbox" id="f-pinned"> 置顶</span></label>
                <div class="modal-actions">
                    <button type="button" class="btn" id="form-cancel">取消</button>
                    <button type="submit" class="btn danger">发布</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js?v=1"></script>
    <script src="js/api.js?v=40"></script>
    <script src="js/common.js?v=47"></script>
    <script src="js/announcements.js?v=1"></script>
