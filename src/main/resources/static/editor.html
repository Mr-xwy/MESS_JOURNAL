<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 · M.E.S.S Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IM+Fell+English+SC&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=51">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css?v=2">
    <link rel="stylesheet" href="css/theme.css?v=1">
    <link rel="stylesheet" href="css/theme-light.css?v=1">
    <script>(function(){try{var t=localStorage.getItem('mess_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body class="editor-page">
    <!-- 左边缘悬停触发区：鼠标移到这里就召唤侧栏 -->
    <div class="sidebar-hover-zone" id="sidebar-trigger"></div>

    <!-- 汉堡按钮：始终可见，召唤侧栏 -->
    <button class="hamburger" id="hamburger" title="召唤导航栏"><svg class="icon"><use href="#icon-menu"/></svg></button>

    <header class="site-header" id="sidebar">
        <div class="brand">
            <div class="brand-title">M.E.S.S Journal</div>
            <div class="brand-sub">杂研期刊 | Method, Experiment, Survey, Summary</div>
        </div>
                <nav class="nav">
            <a href="index.html" id="nav-home"><svg class="icon"><use href="#icon-home"/></svg> 首页</a>
            <a href="articles.html" id="nav-articles"><svg class="icon"><use href="#icon-doc"/></svg> 文章</a>
            <a href="my.html" id="nav-mine"><svg class="icon"><use href="#icon-folder"/></svg> 我的</a>
            <a href="engraving.html" id="nav-engraving"><svg class="icon"><use href="#icon-brush"/></svg> 版画工坊</a>
            <a href="museum.html" id="nav-museum"><svg class="icon"><use href="#icon-museum"/></svg> 线上博物馆</a>
            <a href="puzzle.html" id="nav-puzzle"><svg class="icon"><use href="#icon-grid"/></svg> 每日谜题</a>
            <a href="shop.html" id="nav-shop"><svg class="icon"><use href="#icon-shop"/></svg> 古董铺</a>
            <a href="announcements.html" id="nav-announcements"><svg class="icon"><use href="#icon-inbox"/></svg> 公告</a>
            <a href="inbox.html" id="nav-inbox" style="display:none"><svg class="icon"><use href="#icon-inbox"/></svg> 信息箱</a>
        </nav>
        <div class="header-right">
            <span id="user-area"></span>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="top-bar">
        <div class="top-brand">M·E·S·S Journal · 杂研期刊</div>
        <button class="top-back" id="top-back-btn" type="button" aria-label="返回上一页">
            <svg class="icon"><use href="#icon-arrow-left"/></svg><span>返回</span>
        </button>
    </div>

    <div class="main-wrapper">
    <main class="container" style="padding-top: 40px;">
        <form class="editor-form" onsubmit="return false;">
            <h2 id="editor-title"><svg class="icon"><use href="#icon-pen"/></svg> 投稿 / Write Paper</h2>

            <div class="field">
                <label><svg class="icon"><use href="#icon-type"/></svg> 标题 Title</label>
                <input id="title" class="input" type="text" placeholder="请输入论文标题…" maxlength="200" />
            </div>

            <div class="field">
                <label><svg class="icon"><use href="#icon-tag"/></svg> 分类 Category</label>
                <input id="category" class="input" type="text" placeholder="如：技术 / 学术 / 实验 / 调研 / 随笔" />
            </div>

            <div class="field">
                <label><svg class="icon"><use href="#icon-align"/></svg> 摘要 Abstract</label>
                <input id="summary" class="input" type="text" placeholder="一句话概述本文要点（将显示在文章列表与详情页摘要区）" />
            </div>

            <div class="field">
                <label><svg class="icon"><use href="#icon-file"/></svg> 正文 Content</label>
                <div class="word-count" id="word-count"><span></span><span id="char-num">0 字</span></div>
                <textarea id="content" class="textarea" placeholder="在这里撰写正文内容…&#10;&#10;支持多行文本，换行将被保留。&#10;建议使用 Markdown 语法增强排版（当前为纯文本模式）。"></textarea>
            </div>

            <div class="editor-actions">
                <button class="btn primary" id="publish"><svg class="icon"><use href="#icon-send"/></svg> 发布 Publish</button>
                <button class="btn" id="draft"><svg class="icon"><use href="#icon-save"/></svg> 存为草稿 Save Draft</button>
                <a href="index.html" class="link-btn">取消 Cancel</a>
            </div>

            <div class="error-msg" id="err"></div>
        </form>
    </main>
    </div>

    <!-- AI 助手浮窗 -->
    <button class="ai-fab" id="ai-fab" title="AI 助手"><svg class="icon icon-lg"><use href="#icon-brain"/></svg></button>
    <div class="ai-panel" id="ai-panel" hidden>
        <div class="ai-panel-header">
            <span><svg class="icon"><use href="#icon-brain"/></svg> AI 助手</span>
            <button class="ai-close" id="ai-close" aria-label="关闭"><svg class="icon"><use href="#icon-x"/></svg></button>
        </div>
        <div class="ai-messages" id="ai-messages">
            <div class="ai-msg ai-ai">你好，我是站内 AI 助手。试试问我："标准的学术期刊格式是什么？"</div>
        </div>
        <div class="ai-input-row">
            <textarea id="ai-input" placeholder="问我任何问题…（Enter 发送，Shift+Enter 换行）" rows="1"></textarea>
            <button id="ai-send">发送</button>
        </div>
    </div>

    <script src="js/api.js?v=36"></script>
    <script src="js/common.js?v=47"></script>
    <script src="js/editor.js?v=36"></script>
</body>
</html>
