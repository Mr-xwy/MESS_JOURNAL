<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3a3128" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
  <g transform="translate(200,200)">
    <!-- 玫瑰主体：多层花瓣 -->
    <g>
      <!-- 外层花瓣（5个） -->
      <g>
        <path d="M0,-90 C-20,-80 -30,-60 -25,-40 C-35,-30 -35,-10 -20,-5 C-25,5 -20,20 -5,15 C0,20 5,15 10,15 C20,20 25,5 20,-5 C35,-10 35,-30 25,-40 C30,-60 20,-80 0,-90 Z"/>
      </g>
      <!-- 中层花瓣 -->
      <g transform="rotate(36)">
        <path d="M0,-65 C-12,-55 -18,-40 -15,-25 C-22,-15 -22,0 -12,5 C-15,12 -10,20 0,18 C5,22 12,18 15,12 C22,8 22,-5 15,-15 C20,-30 12,-50 0,-65 Z"/>
      </g>
      <g transform="rotate(72)">
        <path d="M0,-65 C-12,-55 -18,-40 -15,-25 C-22,-15 -22,0 -12,5 C-15,12 -10,20 0,18 C5,22 12,18 15,12 C22,8 22,-5 15,-15 C20,-30 12,-50 0,-65 Z"/>
      </g>
      <!-- 内层花瓣 -->
      <g transform="rotate(108)">
        <path d="M0,-40 C-8,-32 -12,-22 -10,-12 C-15,-5 -15,5 -8,8 C-10,14 -5,20 0,18 C5,20 10,14 8,8 C15,5 15,-5 10,-12 C12,-22 8,-32 0,-40 Z"/>
      </g>
      <g transform="rotate(144)">
        <path d="M0,-40 C-8,-32 -12,-22 -10,-12 C-15,-5 -15,5 -8,8 C-10,14 -5,20 0,18 C5,20 10,14 8,8 C15,5 15,-5 10,-12 C12,-22 8,-32 0,-40 Z"/>
      </g>
      <!-- 最内层（花心） -->
      <path d="M-12,-15 C-15,-8 -15,0 -8,3 C-5,8 0,10 5,8 C10,10 15,5 12,0 C15,-5 12,-12 5,-10 C0,-15 -8,-15 -12,-15 Z"/>
    </g>
    <!-- 茎 -->
    <line x1="0" y1="90" x2="0" y2="160" stroke-width="1.2"/>
    <!-- 叶子 -->
    <path d="M0,120 Q-30,110 -45,120 Q-30,135 0,120"/>
    <path d="M0,140 Q30,130 45,140 Q30,155 0,140"/>
    <!-- 刺 -->
    <line x1="0" y1="100" x2="-3" y2="105" stroke-width="0.5"/>
    <line x1="0" y1="130" x2="3" y2="135" stroke-width="0.5"/>
    <!-- 叶脉 -->
    <path d="M-25,122 L-15,120" opacity="0.5"/>
    <path d="M-30,118 L-20,120" opacity="0.5"/>
    <path d="M25,142 L15,140" opacity="0.5"/>
    <path d="M30,138 L20,140" opacity="0.5"/>
    <!-- 装饰小圆点（花蕊） -->
    <circle cx="0" cy="-3" r="2" fill="#3a3128" stroke="none"/>
  </g>
</svg>
