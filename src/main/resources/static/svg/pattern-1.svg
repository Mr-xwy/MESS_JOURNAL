<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3a3128" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
  <g transform="translate(200,200)">
    <!-- 圆形花环外圈 -->
    <circle cx="0" cy="0" r="160" stroke-width="0.5" stroke-dasharray="2,3"/>
    <circle cx="0" cy="0" r="120"/>
    <!-- 12 朵小花均匀分布 -->
    <g>
      <!-- 12点 -->
      <g transform="rotate(0)">
        <ellipse cx="0" cy="-140" rx="6" ry="14"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="2" fill="#3a3128" stroke="none"/>
      </g>
      <!-- 1点 -->
      <g transform="rotate(30)">
        <ellipse cx="0" cy="-140" rx="5" ry="12"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="1.5" fill="#3a3128" stroke="none"/>
      </g>
      <g transform="rotate(60)">
        <ellipse cx="0" cy="-140" rx="6" ry="14"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="2" fill="#3a3128" stroke="none"/>
      </g>
      <g transform="rotate(90)">
        <ellipse cx="0" cy="-140" rx="5" ry="12"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="1.5" fill="#3a3128" stroke="none"/>
      </g>
      <g transform="rotate(120)">
        <ellipse cx="0" cy="-140" rx="6" ry="14"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="6" ry="14" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="2" fill="#3a3128" stroke="none"/>
      </g>
      <g transform="rotate(150)">
        <ellipse cx="0" cy="-140" rx="5" ry="12"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(60)"/>
        <ellipse cx="0" cy="-140" rx="5" ry="12" transform="rotate(120)"/>
        <circle cx="0" cy="-140" r="1.5" fill="#3a3128" stroke="none"/>
