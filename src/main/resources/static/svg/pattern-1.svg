    <g opacity="0.6">
      <g transform="rotate(15)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(45)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(75)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(105)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(135)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(165)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(195)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(225)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(255)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(285)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(315)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
      <g transform="rotate(345)"><path d="M0,-130 Q-8,-120 -10,-110 Q0,-115 5,-122 Z"/></g>
