<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3a3128" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
  <g transform="translate(200,200)">
    <!-- 外圈 -->
    <circle cx="0" cy="0" r="150"/>
    <circle cx="0" cy="0" r="140" stroke-dasharray="3,3"/>
    <circle cx="0" cy="0" r="120"/>
    <!-- 32 个刻度点 -->
    <g>
      <line x1="0" y1="-150" x2="0" y2="-135" stroke-width="1.2"/>
      <line x1="0" y1="150" x2="0" y2="135" stroke-width="1.2"/>
      <line x1="-150" y1="0" x2="-135" y2="0" stroke-width="1.2"/>
      <line x1="150" y1="0" x2="135" y2="0" stroke-width="1.2"/>
      <g transform="rotate(11.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(22.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(33.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(56.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(67.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(78.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(101.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(112.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(123.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(146.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(157.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(168.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(191.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(202.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(213.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(236.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(247.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(258.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(281.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(292.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(303.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-148" x2="0" y2="-138" stroke-width="1.1"/></g>
      <g transform="rotate(326.25)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(337.5)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
      <g transform="rotate(348.75)"><line x1="0" y1="-148" x2="0" y2="-138"/></g>
    </g>
    <!-- 四大方位字母 -->
    <text x="0" y="-160" text-anchor="middle" font-family="serif" font-size="20" fill="#3a3128" stroke="none">N</text>
    <text x="0" y="170" text-anchor="middle" font-family="serif" font-size="20" fill="#3a3128" stroke="none">S</text>
    <text x="-165" y="6" text-anchor="middle" font-family="serif" font-size="20" fill="#3a3128" stroke="none">W</text>
    <text x="165" y="6" text-anchor="middle" font-family="serif" font-size="20" fill="#3a3128" stroke="none">E</text>
    <!-- 玫瑰花瓣（4个长 + 4个短） -->
    <!-- 长花瓣 N -->
    <path d="M0,-120 L-12,-15 L0,0 L12,-15 Z" fill="#3a3128" fill-opacity="0.3"/>
    <!-- 长花瓣 E -->
    <g transform="rotate(90)"><path d="M0,-120 L-12,-15 L0,0 L12,-15 Z" fill="#3a3128" fill-opacity="0.3"/></g>
    <!-- 长花瓣 S -->
    <g transform="rotate(180)"><path d="M0,-120 L-12,-15 L0,0 L12,-15 Z" fill="#3a3128" fill-opacity="0.3"/></g>
    <!-- 长花瓣 W -->
    <g transform="rotate(270)"><path d="M0,-120 L-12,-15 L0,0 L12,-15 Z" fill="#3a3128" fill-opacity="0.3"/></g>
    <!-- 短花瓣 NE -->
    <g transform="rotate(45)"><path d="M0,-90 L-8,-12 L0,0 L8,-12 Z" opacity="0.6"/></g>
    <g transform="rotate(135)"><path d="M0,-90 L-8,-12 L0,0 L8,-12 Z" opacity="0.6"/></g>
    <g transform="rotate(225)"><path d="M0,-90 L-8,-12 L0,0 L8,-12 Z" opacity="0.6"/></g>
    <g transform="rotate(315)"><path d="M0,-90 L-8,-12 L0,0 L8,-12 Z" opacity="0.6"/></g>
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="8" fill="#3a3128" stroke="none"/>
    <circle cx="0" cy="0" r="14"/>
  </g>
</svg>
