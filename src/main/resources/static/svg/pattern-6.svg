<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3a3128" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
  <g transform="translate(200,200)">
    <!-- 羽毛笔杆（从右上到左下） -->
    <g transform="rotate(-30)">
      <!-- 笔杆主体（羽毛部分） -->
      <path d="M-30,-140 Q-10,-150 30,-130 L40,-50 Q20,-30 -30,-50 Z"/>
      <!-- 羽轴 -->
      <line x1="-30" y1="-50" x2="30" y2="-130" stroke-width="1.2"/>
      <!-- 羽毛羽枝（左侧） -->
      <g opacity="0.6">
        <line x1="-25" y1="-55" x2="-35" y2="-65"/>
        <line x1="-20" y1="-65" x2="-32" y2="-78"/>
        <line x1="-15" y1="-75" x2="-28" y2="-90"/>
        <line x1="-10" y1="-85" x2="-23" y2="-100"/>
        <line x1="-5" y1="-95" x2="-18" y2="-110"/>
        <line x1="0" y1="-105" x2="-12" y2="-120"/>
        <line x1="5" y1="-115" x2="-5" y2="-128"/>
      </g>
      <!-- 羽毛羽枝（右侧） -->
      <g opacity="0.6">
        <line x1="32" y1="-128" x2="42" y2="-118"/>
        <line x1="27" y1="-118" x2="40" y2="-105"/>
        <line x1="22" y1="-108" x2="35" y2="-95"/>
        <line x1="17" y1="-98" x2="30" y2="-85"/>
        <line x1="12" y1="-88" x2="25" y2="-75"/>
        <line x1="7" y1="-78" x2="20" y2="-65"/>
        <line x1="2" y1="-68" x2="15" y2="-55"/>
      </g>
      <!-- 笔尖 -->
      <path d="M-30,-50 L-50,-30 L-45,-25 Z"/>
      <line x1="-45" y1="-25" x2="-65" y2="-5" stroke-width="1.5"/>
    </g>
    <!-- 墨水瓶（右下） -->
    <g transform="translate(60,80)">
      <!-- 瓶口 -->
      <ellipse cx="0" cy="-25" rx="22" ry="5"/>
      <ellipse cx="0" cy="-28" rx="22" ry="5"/>
      <!-- 瓶颈 -->
      <path d="M-18,-25 L-20,-10 L20,-10 L18,-25"/>
      <!-- 瓶身 -->
      <path d="M-30,-10 Q-35,15 -28,30 L28,30 Q35,15 30,-10 Z"/>
      <!-- 瓶底椭圆 -->
      <ellipse cx="0" cy="30" rx="28" ry="6"/>
      <!-- 瓶内墨水 -->
      <path d="M-26,-2 Q-30,18 -25,28 L25,28 Q30,18 26,-2 Z" fill="#3a3128" fill-opacity="0.15" stroke="none"/>
      <!-- 瓶身装饰标签 -->
      <rect x="-15" y="0" width="30" height="15"/>
      <line x1="-10" y1="5" x2="10" y2="5"/>
      <line x1="-10" y1="9" x2="6" y2="9"/>
    </g>
    <!-- 一滴墨水（在笔尖和瓶子之间） -->
    <g transform="translate(-30,40)">
      <path d="M0,-8 Q-4,0 0,5 Q4,0 0,-8 Z" fill="#3a3128" fill-opacity="0.3" stroke="none"/>
    </g>
    <!-- 散落的小墨点 -->
    <circle cx="-50" cy="60" r="1.5" fill="#3a3128" fill-opacity="0.3" stroke="none"/>
    <circle cx="-20" cy="70" r="1" fill="#3a3128" fill-opacity="0.3" stroke="none"/>
    <circle cx="100" cy="120" r="1.5" fill="#3a3128" fill-opacity="0.3" stroke="none"/>
    <circle cx="120" cy="100" r="1" fill="#3a3128" fill-opacity="0.3" stroke="none"/>
    <!-- 底部装饰线 -->
    <line x1="-150" y1="150" x2="150" y2="150" stroke-width="0.5" stroke-dasharray="2,3"/>
  </g>
</svg>
