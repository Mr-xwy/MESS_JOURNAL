<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章流 · M.E.S.S Journal</title>
    <meta name="description" content="杂研期刊文章流 —— 大字杂志排版呈现全部文章，可按分类与关键词检索。">
    <meta name="view-transition" content="same-origin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=51">
    <link rel="stylesheet" href="css/modules.css?v=42">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css?v=2">
    <link rel="stylesheet" href="css/theme.css?v=1">
    <link rel="stylesheet" href="css/theme-light.css?v=1">
    <link rel="stylesheet" href="css/articles.css?v=1">
    <script>(function(){try{var t=localStorage.getItem('mess_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body class="newspaper-page">
    <!-- 左边缘悬停触发区：鼠标移到这里就召唤侧栏 -->
    <div class="sidebar-hover-zone" id="sidebar-trigger"></div>

    <!-- 汉堡按钮：始终可见，单击召唤侧栏 -->
    <button class="hamburger" id="hamburger" title="召唤导航栏" aria-label="召唤导航栏" aria-expanded="false" aria-controls="sidebar"><svg class="icon"><use href="#icon-menu"/></svg></button>

    <!-- 左侧固定导航栏（默认隐藏在屏幕外） -->
    <header class="site-header" id="sidebar">
        <div class="brand">
            <div class="brand-title">M.E.S.S Journal</div>
            <div class="brand-sub">杂研期刊 | Method, Experiment, Survey, Summary</div>
        </div>
        <nav class="nav">
            <a href="index.html" id="nav-home"><svg class="icon"><use href="#icon-home"/></svg> 首页</a>
            <a href="articles.html" id="nav-articles" class="active"><svg class="icon"><use href="#icon-doc"/></svg> 文章</a>
            <a href="my.html" id="nav-mine"><svg class="icon"><use href="#icon-folder"/></svg> 我的</a>
            <a href="engraving.html" id="nav-engraving"><svg class="icon"><use href="#icon-brush"/></svg> 版画工坊</a>
            <a href="museum.html" id="nav-museum"><svg class="icon"><use href="#icon-museum"/></svg> 线上博物馆</a>
            <a href="puzzle.html" id="nav-puzzle"><svg class="icon"><use href="#icon-grid"/></svg> 每日谜题</a>
            <a href="shop.html" id="nav-shop"><svg class="icon"><use href="#icon-shop"/></svg> 古董铺</a>
            <a href="announcements.html" id="nav-announcements"><svg class="icon"><use href="#icon-inbox"/></svg> 公告</a>
            <a href="inbox.html" id="nav-inbox" style="display:none"><svg class="icon"><use href="#icon-inbox"/></svg> 信息箱</a>
        </nav>
        <div class="header-right">
            <div id="user-area"></div>
        </div>
    </header>

    <!-- 遮罩（移动端点击关闭） -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ==================== 主体 ==================== -->
    <div class="main-wrapper">
        <!-- 页头：标题 + 投稿按钮 -->
        <header class="articles-masthead reveal">
            <div class="am-overline">THE ARCHIVE · 文章流</div>
            <div class="am-row">
                <h1 class="am-title">全部文章</h1>
                <a class="btn btn-gold magnetic" href="editor.html"><svg class="icon"><use href="#icon-pen"/></svg> 投稿</a>
            </div>
            <div class="am-sub">大字杂志排版 · 点击任意标题阅读全文</div>
        </header>

        <!-- 分类 + 搜索 -->
        <div class="departments-bar">
            <div class="search-wrap">
                <svg class="icon"><use href="#icon-search"/></svg>
                <input id="search" class="search-input" type="text" placeholder="Search the Journal…" />
            </div>
            <div class="chips" id="chips"></div>
        </div>

        <!-- A 方案：大字杂志行 -->
        <section class="articles-rows-section reveal">
            <div class="article-rows" id="article-rows"></div>
            <div class="pager" id="pager"></div>
        </section>

        <footer class="footer footer--ink reveal">M·E·S·S Journal — 杂研期刊 · Mr.Vale</footer>
    </div><!-- /main-wrapper -->

    <script src="js/config.js?v=1"></script>
    <script src="js/api.js?v=40"></script>
    <script src="js/common.js?v=47"></script>
    <script src="js/articles.js?v=1"></script>
</body>
</html>
